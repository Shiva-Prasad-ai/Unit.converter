<!DOCTYPE html>
<html>
<head meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Unit Converter</title>

<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#e3f2fd,#bbdefb);
}

.navbar{
    background:#0d47a1;
    color:white;
    padding:15px 20px;
    display:flex;
    align-items:center;
    gap:15px;
}

.nav-title{
    font-size:18px;
    font-weight:600;
}
.menu-icon{
    width:30px;
    cursor:pointer;
}

.menu-icon div{
    height:4px;
    background:white;
    margin:5px 0;
}

.sidebar{
    position:fixed;
    left:-260px;
    top:0;
    width:260px;
    height:100%;
    background:#1565c0;
    padding-top:20px;
    transition:0.3s ease;
    z-index:1000;
}

.active{
    left:0;
}
.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
    font-weight:500;
}

.sidebar a:hover{
    background:#1e88e5;
}

.close-btn{
    text-align:right;
    padding:10px 15px;
    font-size:22px;
    cursor:pointer;
    color:white;
}

.active{
    left:0;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    background:white;
    padding:30px;
    width:90%;
    max-width:500px;
    border-radius:20px;
    box-shadow:0 20px 45px rgba(0,0,0,0.15);
    text-align:center;
}
.card h2{
    color:#0d47a1;
}

select,input,button{
    width:100%;
    padding:14px;
    margin:12px 0;
    border-radius:30px;
    border:1px solid #90caf9;
    font-size:16px;
}

select:focus,input:focus{
    outline:none;
    border:2px solid #0d47a1;
}

button{
    background:#1565c0;
    color:white;
    cursor:pointer;
    border:none;
}

button:hover{
    background:#0d47a1;
}

.output-box{
    margin-top:15px;
    padding:18px;
    border-radius:15px;
    border:2px solid #1565c0;
    background:#e3f2fd;
    font-weight:600;
    font-size:20px;
    color:#0d47a1;
}
@media (max-width:480px){

.navbar{
    padding:10px 14px;
}

.nav-title{
    font-size:16px;
}

.menu-icon{
    width:24px;
}

.menu-icon div{
    height:2.5px;
}

}
</style>
</head>

<body>

<div class="navbar">
    <div class="menu-icon" onclick="toggleMenu(event)">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <span class="nav-title">Unit Converter</span>
</div>

<div class="sidebar" id="sidebar">
    <div class="close-btn" onclick="closeMenu()">×</div>
    <a href="#" onclick="changeCategory('length')">Length</a>
    <a href="#" onclick="changeCategory('area')">Area</a>
    <a href="#" onclick="changeCategory('volume')">Volume</a>
    <a href="#" onclick="changeCategory('weight')">Weight</a>
    <a href="#" onclick="changeCategory('time')">Time</a>
</div>

<div class="container" onclick="closeMenu()">
<div class="card" onclick="event.stopPropagation()">

<h2 id="title">Length Converter</h2>

<select id="from" onchange="convert()"></select>
<select id="to" onchange="convert()"></select>

<button onclick="swapUnits()">Swap Units</button>

<input type="number" id="input" placeholder="Enter value" oninput="convert()">

<div class="output-box" id="result">Result:</div>

</div>
</div>

<script>

const units = {

length:{
Meter:1,
Kilometer:1000,
Centimeter:0.01,
Millimeter:0.001,
Micrometer:1e-6,
Nanometer:1e-9,
Mile:1609.344,
Yard:0.9144,
Foot:0.3048,
Inch:0.0254,
"Light Year":9.460730472e15
},

area:{
"Square Meter":1,
"Square Kilometer":1e6,
"Square Centimeter":1e-4,
"Square Millimeter":1e-6,
"Square Micrometer":1e-12,
Hectare:10000,
"Acre":4046.8564224,
"Square Mile":2.58998811e6,
"Square Yard":0.83612736,
"Square Foot":0.09290304,
"Square Inch":0.00064516
},

volume:{
"Cubic Meter":1,
Liter:0.001,
Milliliter:1e-6,
"Cubic Kilometer":1e9,
"Cubic Centimeter":1e-6,
"Cubic Millimeter":1e-9,
"US Gallon":0.003785411784,
"Cubic Foot":0.028316846592
},

weight:{
Kilogram:1,
Gram:0.001,
Milligram:1e-6,
"Metric Ton":1000,
Pound:0.45359237,
Ounce:0.028349523125,
Carat:0.0002
},

time:{
Second:1,
Millisecond:0.001,
Microsecond:1e-6,
Nanosecond:1e-9,
Minute:60,
Hour:3600,
Day:86400,
Week:604800,
Year:31536000
}

};

let current="length";

function toggleMenu(e){
e.stopPropagation();
document.getElementById("sidebar").classList.toggle("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
}

function changeCategory(cat){
closeMenu();
current=cat;
document.getElementById("title").innerText=
cat.charAt(0).toUpperCase()+cat.slice(1)+" Converter";
populate();
convert();
}

function populate(){
let from=document.getElementById("from");
let to=document.getElementById("to");
from.innerHTML="";
to.innerHTML="";
Object.keys(units[current]).forEach(u=>{
from.innerHTML+=`<option>${u}</option>`;
to.innerHTML+=`<option>${u}</option>`;
});
}

function swapUnits(){
let from=document.getElementById("from");
let to=document.getElementById("to");
let temp=from.value;
from.value=to.value;
to.value=temp;
convert();
}

function convert(){

let raw=document.getElementById("input").value;

if(raw.trim()===""){
document.getElementById("result").innerText="Result:";
return;
}

let val=Number(raw);
if(!isFinite(val)){
document.getElementById("result").innerText="Result:";
return;
}

let from=document.getElementById("from").value;
let to=document.getElementById("to").value;


let final=val*(units[current][from]/units[current][to]);

let formatted;

if(Math.abs(final) >= 1e12 || Math.abs(final) <= 1e-9){
    formatted = final.toExponential(6);
}else{
    formatted = parseFloat(final.toFixed(10)).toString();
}

document.getElementById("result").innerText="Result: "+formatted;

}

populate();

</script>

</body>
</html>
